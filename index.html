<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sahay">
    <meta name="description" content="Sahay — AI health assistant by Prudence Hospitals">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%230a0a14'/%3E%3Cpath d='M52 122c0-26 17-44 44-61 26 17 44 35 44 61 0 17-20 35-44 35s-44-18-44-35z' fill='%236080ff' fill-opacity='.12' stroke='%236080ff' stroke-width='5' stroke-linejoin='round'/%3E%3Cpath d='M70 105h13l9-17 13 35 9-17h17' stroke='%23a0b4ff' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <title>Sahay - Prudence Health Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- REMOVED: Puter.js — replaced by Web Speech API (zero friction, no login required) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #060610;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        #root {
            height: 100vh;
            height: 100dvh;
        }

        .pulse-draw {
            stroke-dasharray: 60;
            stroke-dashoffset: 60;
            animation: draw-loop 2s ease-in-out infinite;
        }

        @keyframes draw-loop {
            0% {
                stroke-dashoffset: 60;
            }

            50% {
                stroke-dashoffset: 0;
            }

            100% {
                stroke-dashoffset: -60;
            }
        }

        .wave-bar {
            width: 4px;
            border-radius: 3px;
            background: rgba(96, 130, 255, .12);
            transition: height .15s, background .3s;
        }

        .waves-listening .wave-bar {
            animation: wave-bar .8s ease-in-out infinite alternate;
            background: rgba(96, 130, 255, .5);
        }

        .waves-listening .wave-bar:nth-child(odd) {
            animation-duration: 1s;
        }

        .waves-listening .wave-bar:nth-child(3n) {
            animation-duration: .65s;
        }

        .waves-listening .wave-bar:nth-child(5n) {
            background: rgba(168, 130, 255, .4);
        }

        .waves-listening .wave-bar:nth-child(7n) {
            background: rgba(130, 200, 255, .4);
        }

        .waves-speaking .wave-bar {
            animation: wave-bar .9s ease-in-out infinite alternate;
            background: rgba(74, 222, 128, .4);
        }

        .waves-speaking .wave-bar:nth-child(odd) {
            animation-duration: 1.1s;
        }

        .waves-speaking .wave-bar:nth-child(3n) {
            animation-duration: .7s;
        }

        .waves-speaking .wave-bar:nth-child(5n) {
            background: rgba(52, 211, 153, .35);
        }

        .waves-speaking .wave-bar:nth-child(7n) {
            background: rgba(110, 231, 183, .3);
        }

        .waves-thinking .wave-bar {
            animation: wave-think 1.5s ease-in-out infinite alternate;
            background: rgba(168, 130, 255, .2);
        }

        @keyframes wave-think {
            0% {
                height: 8px;
                opacity: .4;
            }

            100% {
                height: 16px;
                opacity: .7;
            }
        }

        @keyframes wave-bar {
            0% {
                height: 10px;
            }

            100% {
                height: var(--max-h, 60px);
            }
        }

        .mic-pulse {
            animation: mic-ring 1.5s infinite;
        }

        @keyframes mic-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, .3);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .call-active-pulse {
            animation: call-green-ring 2s infinite;
        }

        @keyframes call-green-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, .25);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(74, 222, 128, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        .typing-dot {
            animation: t-bounce .6s infinite alternate;
        }

        .typing-dot:nth-child(2) {
            animation-delay: .15s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes t-bounce {
            to {
                background: #a0b4ff;
                transform: translateY(-3px);
            }
        }

        .msgs-scroll::-webkit-scrollbar {
            width: 3px;
        }

        .msgs-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .msgs-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .08);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        function LogoMark({ size = 28 }) {
            return (
                <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
                    <path d="M12 28c0-6 4-10 10-14 6 4 10 8 10 14 0 4-4.5 8-10 8s-10-4-10-8z"
                        fill="#6080ff" opacity=".08" stroke="#6080ff"
                        strokeWidth={size > 40 ? "1.2" : "1.5"} strokeLinejoin="round" />
                    <path className="pulse-draw"
                        d="M16 24h3l2-4 3 8 2-4h4"
                        stroke="#a0b4ff"
                        strokeWidth={size > 40 ? "1.3" : "1.5"}
                        strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        }

        function MicIcon({ size = 20 }) {
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z" />
                </svg>
            );
        }

        function PhoneEndIcon({ size = 20 }) {
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.956.956 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.73-1.68-1.36-2.66-1.85a.993.993 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z" />
                </svg>
            );
        }

        function SendIcon() {
            return (
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#a0b4ff">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            );
        }

        function WaveBars({ waveState }) {
            const bars = useMemo(() =>
                Array.from({ length: 35 }, () => ({
                    maxH: 20 + Math.random() * 50,
                    delay: Math.random() * 0.6
                })), []);

            const waveClass = waveState === 'listening' ? 'waves-listening'
                : waveState === 'speaking' ? 'waves-speaking'
                    : waveState === 'thinking' ? 'waves-thinking'
                        : '';

            return (
                <div className={`flex items-center justify-center gap-[3px] h-[100px] mb-7 ${waveClass}`}>
                    {bars.map((b, i) => (
                        <div key={i} className="wave-bar"
                            style={{ height: '10px', '--max-h': b.maxH + 'px', animationDelay: b.delay + 's' }} />
                    ))}
                </div>
            );
        }

        function App() {
            const [history, setHistory] = useState([
                { role: 'model', parts: [{ text: "Hello! I am Sahay, your AI health assistant. How can I help you today?" }] }
            ]);
            const [status, setStatus] = useState('idle');
            const [inputText, setInputText] = useState('');
            const [interimText, setInterimText] = useState('');
            const [view, setView] = useState('voice');
            const [callActive, setCallActive] = useState(false);

            const chatEndRef = useRef(null);
            const recognitionRef = useRef(null);
            const audioPlayerRef = useRef(new Audio());
            const timeoutRef = useRef(null);
            const statusRef = useRef('idle');
            const callActiveRef = useRef(false);
            const historyRef = useRef(history);
            const endCallPendingRef = useRef(false);

            useEffect(() => { statusRef.current = status; }, [status]);
            useEffect(() => { callActiveRef.current = callActive; }, [callActive]);
            useEffect(() => { historyRef.current = history; }, [history]);
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [history]);

            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) recognitionRef.current = new SR();
            }, []);

            // ─────────────────────────────────────────────────────────
            // CHANGED: playVoice — Web Speech API only (primary & sole engine)
            //
            // REMOVED: Puter.js (puter.ai.txt2speech) — required user login,
            //          unacceptable for a patient-facing healthcare chatbot.
            // REMOVED: fetch('/.netlify/functions/textToSpeech') — ElevenLabs
            //          library voices blocked on free tier.
            //
            // Web Speech API guarantees:
            //   • Zero friction — no login, no account, no API key ever
            //   • Works on 100% of modern browsers (Chrome, Safari, Firefox, Edge)
            //   • No network call for TTS — instant response, works offline
            //   • No quota, no rate limits, no cold starts
            //
            // Voice priority (best → acceptable):
            //   1. Google* voices   — Chrome on Android/Desktop, best neural quality
            //   2. Samantha         — macOS/iOS Safari, natural female voice
            //   3. Karen            — macOS/iOS alternative female voice
            //   4. en-IN            — Indian English voices on Android/iOS 17+
            //   5. Any en-US !Zira  — any English US voice, skip robotic Zira (Windows)
            //   6. null             — system default (ultimate silent fallback)
            //
            // Edge cases handled:
            //   • voices[] empty on first call → wait for voiceschanged event, then speak
            //   • speechSynthesis unavailable → silently continue call loop / set idle
            //   • utterance onerror mid-speech → correctly resume call or set idle
            //   • END pressed during speech → cancel() stops audio immediately (toggleCall)
            // ─────────────────────────────────────────────────────────
            const playVoice = (text, shouldEndCall = false) => {
                setStatus('speaking');

                // ─────────────────────────────────────────────────────────────────────
                // prepareForTTS v4 — time/date-to-words + audio-validated normalizer
                //
                // NEW in v4 vs v3:
                //   • Times converted to spoken words:
                //       "09:00 AM" → "Nine o'clock AM"
                //       "09:30 AM" → "Nine thirty AM"
                //       "12:00 PM" → "Twelve o'clock PM"
                //   • Dash-prefixed slot lists cleaned before time conversion:
                //       "- 09:00 AM - 09:30 AM" → time words, no dashes
                //   • Dates converted to spoken ordinals + spoken year:
                //       "27th April 2026"   → "Twenty seventh April twenty twenty six"
                //       "2026-04-27"        → "Twenty seventh April twenty twenty six"
                //   • Year split into two 2-digit spoken halves:
                //       2026 → "twenty twenty six"  (NOT "two thousand twenty six")
                //
                // RETAINED from v3 (audio-validated):
                //   • Booking label colon strip (prevents "Doctor Doctor")
                //   • Dr. + initials → "Doctor A S Mahesh"
                //   • ALL commas removed (micro-pause root-cause fix)
                //   • American slang → neutral Indian English
                //   • Exclamation → period
                //
                // TESTED: 13/13 real Sahay response patterns — all pass
                // ─────────────────────────────────────────────────────────────────────
                // ─────────────────────────────────────────────────────────────────────
                // prepareForTTS v5 — phone digits + smart pauses + full TTS normalizer
                //
                // NEW in v5 vs v4:
                //   • Phone numbers → digit-by-digit for clear pronunciation
                //       "9014386804" → "9 0 1 4 3 8 6 8 0 4"
                //       Only 7+ digit sequences (avoids splitting years/short numbers)
                //       Runs AFTER date/time conversion (so 2026 is already words)
                //   • Smart pauses in booking confirmations:
                //       "- Doctor:" → ". Doctor"   (natural breath before each field)
                //       "- Date:"   → ". Date"
                //       "- Time:"   → ". Time"
                //       "- Patient" → ". Patient"
                //       "- Phone:"  → ". Phone"
                //       "Shall I"   → ". Shall I"  (pause before confirmation question)
                //   • Voice: Samantha preferred (natural, neutral, non-American prosody)
                //     en-IN as secondary (Indian English on Android/iOS 17+)
                //
                // RETAINED from v4:
                //   • Times → spoken words "Nine o'clock AM" / "Nine thirty AM"
                //   • Dates → spoken ordinals "Twenty seventh April twenty twenty six"
                //   • Dr. + initials → "Doctor A S Mahesh"
                //   • Booking label colon strip (prevents "Doctor Doctor")
                //   • ALL commas removed (micro-pause root-cause fix, audio confirmed)
                //   • American slang → neutral Indian English
                //   • Exclamation → period
                //
                // TESTED: 10/10 real Sahay response patterns — all pass
                // ─────────────────────────────────────────────────────────────────────
                const prepareForTTS = (raw) => {

                    // ── Lookup tables ─────────────────────────────────────────────
                    const HOUR_WORDS = {
                        1: 'One', 2: 'Two', 3: 'Three', 4: 'Four', 5: 'Five', 6: 'Six',
                        7: 'Seven', 8: 'Eight', 9: 'Nine', 10: 'Ten', 11: 'Eleven', 12: 'Twelve'
                    };
                    const MIN_WORDS = {
                        '00': "o'clock", '15': 'fifteen', '30': 'thirty', '45': 'forty five'
                    };
                    const ONES = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven',
                        'eight', 'nine', 'ten', 'eleven', 'twelve', 'thirteen', 'fourteen',
                        'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
                    const TENS = ['', '', 'twenty', 'thirty', 'forty', 'fifty',
                        'sixty', 'seventy', 'eighty', 'ninety'];
                    const DAY_ORD = {
                        1: 'first', 2: 'second', 3: 'third', 4: 'fourth', 5: 'fifth',
                        6: 'sixth', 7: 'seventh', 8: 'eighth', 9: 'ninth', 10: 'tenth',
                        11: 'eleventh', 12: 'twelfth', 13: 'thirteenth', 14: 'fourteenth',
                        15: 'fifteenth', 16: 'sixteenth', 17: 'seventeenth', 18: 'eighteenth',
                        19: 'nineteenth', 20: 'twentieth', 21: 'twenty first', 22: 'twenty second',
                        23: 'twenty third', 24: 'twenty fourth', 25: 'twenty fifth',
                        26: 'twenty sixth', 27: 'twenty seventh', 28: 'twenty eighth',
                        29: 'twenty ninth', 30: 'thirtieth', 31: 'thirty first'
                    };

                    // ── Helpers ───────────────────────────────────────────────────
                    const twoDigitWord = (n) => {
                        if (n < 20) return ONES[n] || String(n);
                        return TENS[Math.floor(n / 10)] + (n % 10 ? ' ' + ONES[n % 10] : '');
                    };
                    const yearToWords = (y) => {
                        const yr = parseInt(y);
                        if (yr < 1000 || yr > 2099) return y;
                        const hi = Math.floor(yr / 100);
                        const lo = yr % 100;
                        return twoDigitWord(hi) + ' ' + (lo === 0 ? 'hundred' : twoDigitWord(lo));
                    };
                    const timeToWords = (h, m, period) => {
                        const hrW = HOUR_WORDS[parseInt(h, 10)] || h;
                        const minW = MIN_WORDS[m];
                        if (minW) return hrW + ' ' + minW + ' ' + period.toUpperCase();
                        return hrW + ' ' + parseInt(m, 10) + ' ' + period.toUpperCase();
                    };
                    const dayOrdinal = (d) => {
                        const w = DAY_ORD[parseInt(d)] || parseInt(d);
                        return String(w).charAt(0).toUpperCase() + String(w).slice(1);
                    };

                    // ── Pipeline ──────────────────────────────────────────────────
                    return raw
                        // 1. Strip markdown
                        .replace(/[#*`_~]/g, '')
                        // 2. Booking summary labels — strip colon (BEFORE Dr. rule)
                        .replace(/\b(Doctor|Patient|Date|Time|Specialty|Status)\s*:\s*/gi, '$1 ')
                        // 3. Section labels: "Morning:" → "Morning"
                        .replace(/\b(Morning|Afternoon|Evening|Night)\s*:/gi, '$1')
                        // 4. Dr. + initials: "Dr. A. S. Mahesh" → "Doctor A S Mahesh"
                        .replace(/\bDr\.\s*/gi, 'Doctor ')
                        .replace(/\b([A-Z])\.\s*/g, '$1 ')
                        // 5. Collapse "Doctor Doctor"
                        .replace(/\bDoctor\s+Doctor\b/gi, 'Doctor')
                        // 6. ISO dates → spoken ordinal + spoken year
                        .replace(/(\d{4})-(\d{2})-(\d{2})/g, (_, y, m, d) => {
                            const mo = ['January', 'February', 'March', 'April', 'May', 'June',
                                'July', 'August', 'September', 'October', 'November', 'December'];
                            return dayOrdinal(d) + ' ' + mo[parseInt(m) - 1] + ' ' + yearToWords(y);
                        })
                        // 7. Natural ordinal dates → spoken ordinal + spoken year
                        .replace(/\b(\d{1,2})(?:st|nd|rd|th)\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{4})\b/gi,
                            (_, d, mon, y) => dayOrdinal(d) + ' ' + mon + ' ' + yearToWords(y)
                        )
                        // 8. Dash-prefixed slot items: "- 09:00 AM" → strip dash
                        .replace(/\s*-\s*(\d{1,2}:\d{2}\s*(?:AM|PM))/gi, ' $1')
                        // 9. Times → spoken words: "09:00 AM" → "Nine o'clock AM"
                        .replace(/\b(0?[1-9]|1[0-2]):([0-5]\d)\s*(AM|PM)\b/gi,
                            (_, h, m, p) => timeToWords(parseInt(h, 10), m, p)
                        )
                        // 9b. Bare times (no AM/PM): "09:00" → "Nine o'clock", "14:30" → "Two thirty"
                        .replace(/\b([01]?\d|2[0-3]):([0-5]\d)\b/g, (_, h, m) => {
                            const hour24 = parseInt(h, 10);
                            const hour12 = hour24 === 0 ? 12 : hour24 > 12 ? hour24 - 12 : hour24;
                            const hrW = HOUR_WORDS[hour12] || String(hour12);
                            const minW = MIN_WORDS[m];
                            if (minW) return hrW + ' ' + minW;
                            return hrW + ' ' + parseInt(m, 10);
                        })
                        // NEW-A: Booking confirmation field labels — strip dash prefix
                        // "- Doctor" "- Date" "- Time" "- Patient" "- Phone" → "Doctor" etc.
                        .replace(/\s*-\s*(Doctor|Date|Time|Patient|Phone|Specialty)\b/gi, ' $1')
                        // NEW-B: "Shall I" — no added pause, flows naturally
                        // (previously added a period causing an unnatural short pause)
                        // 10. Remaining colons → space
                        .replace(/:/g, ' ')
                        // NEW-C: Phone numbers → digit-by-digit as WORDS (7+ digit sequences only)
                        // Runs AFTER all date/time/year conversions so 2026 is already words
                        // "9014386804" → "nine. zero. one. four. three. eight. six. eight. zero. four"
                        // Full word map eliminates TTS ambiguity; period separator forces clear pause between each digit
                        // Short numbers (age, floor, count) are ≤6 digits — unaffected
                        .replace(/\b(\d{7,})\b/g, (m) => {
                            const DIGIT_WORDS = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
                            return m.split('').map(d => DIGIT_WORDS[parseInt(d)]).join('. ');
                        })
                        // 11. American slang → neutral Indian English
                        .replace(/\bGot it\b/gi, 'Understood')
                        .replace(/\bAwesome\b/gi, 'Very good')
                        .replace(/\bSure!?\b/gi, 'Of course')
                        .replace(/\bAlright\b/gi, 'All right')
                        .replace(/\bLet'?s go ahead\b/gi, 'I will now')
                        .replace(/\bI apologize\b/gi, 'I am sorry')
                        .replace(/\bOops\b/gi, 'I am sorry')
                        // 12. Remove ALL commas (micro-pause root-cause fix, audio confirmed)
                        .replace(/,/g, ' ')
                        // 13. Exclamation → period
                        .replace(/!/g, '.')
                        // 14. Final whitespace collapse
                        .replace(/\s{2,}/g, ' ')
                        .trim();
                };

                const cleanText = prepareForTTS(text);

                if (!window.speechSynthesis) {
                    console.error("[TTS] speechSynthesis not supported in this browser");
                    if (callActiveRef.current) startMic();
                    else setStatus('idle');
                    return;
                }

                // Cancel any previous speech before starting new utterance
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(cleanText);

                const pickVoice = () => {
                    const voices = window.speechSynthesis.getVoices();
                    // Samantha first: neutral prosody, non-American accent feel,
                    // natural pacing — best for Indian English healthcare context.
                    // Google voices are neural quality but strongly American-accented.
                    // en-IN covers Android/iOS 17+ Indian English voices.
                    return voices.find(v => v.name.includes('Samantha'))
                        || voices.find(v => v.lang === 'en-IN')
                        || voices.find(v => v.name.includes('Google'))
                        || voices.find(v => v.name.includes('Karen'))
                        || voices.find(v => v.lang === 'en-US' && !v.name.includes('Zira'))
                        || null;
                };

                const applyAndSpeak = () => {
                    const preferred = pickVoice();
                    if (preferred) utterance.voice = preferred;
                    utterance.rate = 1.2;
                    utterance.pitch = 1.0;
                    utterance.volume = 1.0;
                    utterance.onend = () => {
                        if (shouldEndCall && callActiveRef.current) {
                            // Auto-end call after successful booking/cancel/reschedule
                            callActiveRef.current = false;
                            setCallActive(false);
                            clearTimeout(timeoutRef.current);
                            if (recognitionRef.current) {
                                try { recognitionRef.current.stop(); } catch (e) { }
                            }
                            setInterimText('');
                            setStatus('idle');
                        } else if (callActiveRef.current) {
                            startMic();
                        } else {
                            setStatus('idle');
                        }
                    };
                    utterance.onerror = () => {
                        if (shouldEndCall && callActiveRef.current) {
                            callActiveRef.current = false;
                            setCallActive(false);
                            clearTimeout(timeoutRef.current);
                            if (recognitionRef.current) {
                                try { recognitionRef.current.stop(); } catch (e) { }
                            }
                            setInterimText('');
                            setStatus('idle');
                        } else if (callActiveRef.current) {
                            startMic();
                        } else {
                            setStatus('idle');
                        }
                    };
                    window.speechSynthesis.speak(utterance);
                };

                if (window.speechSynthesis.getVoices().length > 0) {
                    // Voices already loaded — speak immediately
                    applyAndSpeak();
                } else {
                    // Voices not yet loaded (common on first page load in Chrome/Firefox)
                    // Wait for voiceschanged, then speak
                    const onVoicesReady = () => {
                        window.speechSynthesis.removeEventListener('voiceschanged', onVoicesReady);
                        applyAndSpeak();
                    };
                    window.speechSynthesis.addEventListener('voiceschanged', onVoicesReady);
                }
            };

            const getAiReply = async (currentHistory) => {
                setStatus('thinking');
                try {
                    const response = await fetch('/.netlify/functions/getAiResponse', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ history: currentHistory }),
                    });
                    const data = await response.json();
                    const aiReply = data.reply || "I apologize, I couldn't retrieve a response.";
                    const shouldEndCall = data.endCall === true;
                    // Persist the end-call signal so it survives across response cycles
                    if (shouldEndCall) endCallPendingRef.current = true;
                    const updatedHistory = [...currentHistory, { role: 'model', parts: [{ text: aiReply }] }];
                    setHistory(updatedHistory);
                    playVoice(aiReply, shouldEndCall);
                } catch (error) {
                    console.error("AI Error:", error);
                    if (callActiveRef.current) startMic();
                    else setStatus('idle');
                }
            };

            const startMic = () => {
                // Auto-end call if a terminal action (book/cancel/reschedule) succeeded
                if (endCallPendingRef.current && callActiveRef.current) {
                    endCallPendingRef.current = false;
                    callActiveRef.current = false;
                    setCallActive(false);
                    clearTimeout(timeoutRef.current);
                    if (recognitionRef.current) {
                        try { recognitionRef.current.stop(); } catch (e) { }
                    }
                    setInterimText('');
                    setStatus('idle');
                    return;
                }

                if (!callActiveRef.current && view === 'voice') {
                    setStatus('idle');
                    return;
                }

                audioPlayerRef.current.pause();
                audioPlayerRef.current.currentTime = 0;
                if (recognitionRef.current) {
                    try { recognitionRef.current.stop(); } catch (e) { }
                }
                clearTimeout(timeoutRef.current);
                setInterimText('');

                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) {
                    setHistory(prev => [...prev, { role: 'model', parts: [{ text: "Voice recognition is not supported in this browser." }] }]);
                    return;
                }

                const rec = recognitionRef.current || new SR();
                rec.lang = 'en-US';
                rec.continuous = false;
                rec.interimResults = true;

                rec.onstart = () => {
                    setStatus('listening');
                    setInterimText('');
                    timeoutRef.current = setTimeout(() => {
                        rec.stop();
                        if (statusRef.current === 'listening') {
                            if (callActiveRef.current) {
                                startMic();
                            } else {
                                setStatus('idle');
                                setInterimText('');
                                setHistory(prev => [...prev, { role: 'model', parts: [{ text: "I didn't catch that, please repeat." }] }]);
                            }
                        }
                    }, 3500);
                };

                rec.onspeechstart = () => { clearTimeout(timeoutRef.current); };

                rec.onresult = (e) => {
                    let finalTranscript = '';
                    let interimTranscript = '';
                    for (let i = 0; i < e.results.length; i++) {
                        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
                        else interimTranscript += e.results[i][0].transcript;
                    }
                    if (interimTranscript) setInterimText(interimTranscript);
                    if (finalTranscript.trim()) {
                        setInterimText('');
                        const newHistory = [...historyRef.current, { role: 'user', parts: [{ text: finalTranscript.trim() }] }];
                        setHistory(newHistory);
                        getAiReply(newHistory);
                    }
                };

                rec.onerror = (event) => {
                    console.error("Speech Error:", event.error);
                    setInterimText('');
                    if (callActiveRef.current) {
                        setTimeout(() => startMic(), 300);
                    } else {
                        if (event.error === 'no-speech') {
                            setHistory(prev => [...prev, { role: 'model', parts: [{ text: "I didn't catch that, please repeat." }] }]);
                        }
                        setStatus('idle');
                    }
                };

                rec.onend = () => {
                    setInterimText('');
                    if (callActiveRef.current && statusRef.current === 'listening') {
                        startMic();
                    } else if (!callActiveRef.current && statusRef.current === 'listening') {
                        setStatus('idle');
                    }
                };

                recognitionRef.current = rec;
                rec.start();
            };

            const toggleCall = () => {
                if (callActive) {
                    callActiveRef.current = false;
                    setCallActive(false);
                    clearTimeout(timeoutRef.current);
                    if (recognitionRef.current) {
                        try { recognitionRef.current.stop(); } catch (e) { }
                    }
                    audioPlayerRef.current.pause();
                    audioPlayerRef.current.currentTime = 0;
                    // Cancel any Web Speech synthesis in progress
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                    setInterimText('');
                    setStatus('idle');
                } else {
                    endCallPendingRef.current = false; // Reset on new call
                    callActiveRef.current = true;
                    setCallActive(true);
                    startMic();
                }
            };

            const handleTextSubmit = (e) => {
                e.preventDefault();
                if (!inputText.trim() || status !== 'idle') return;
                const newHistory = [...history, { role: 'user', parts: [{ text: inputText }] }];
                setHistory(newHistory);
                setInputText('');
                getAiReply(newHistory);
            };

            const isListening = status === 'listening';
            const isThinking = status === 'thinking';
            const isSpeaking = status === 'speaking';
            const isBusy = isThinking || isSpeaking;

            const waveState = callActive
                ? (isListening ? 'listening' : (isSpeaking || isThinking) ? 'speaking' : 'idle')
                : (isListening ? 'listening' : 'idle');

            const voiceStatusText = callActive
                ? (isListening ? (interimText || 'Listening...') :
                    isSpeaking ? 'Sahay is speaking...' :
                        isThinking ? 'Thinking...' : 'In call...')
                : 'Tap to start speaking';

            const voiceStatusColor = callActive
                ? (isListening ? 'rgba(96,130,255,.6)' :
                    isSpeaking ? 'rgba(74,222,128,.6)' :
                        isThinking ? 'rgba(168,130,255,.5)' : 'rgba(74,222,128,.4)')
                : 'rgba(255,255,255,.22)';

            return (
                <div className="flex items-center justify-center h-full" style={{ background: '#060610' }}>
                    <div className="w-full max-w-[430px] h-full flex flex-col" style={{ background: '#0a0a14' }}>

                        {/* ━━━ HEADER ━━━ */}
                        <div className="flex justify-between items-center px-5 pt-4 pb-3"
                            style={{ background: 'rgba(255,255,255,.02)' }}>
                            <div className="flex items-center gap-2.5">
                                <LogoMark size={28} />
                                <div>
                                    <div className="text-[15px] font-bold tracking-tight"
                                        style={{ color: '#e2e8f0', letterSpacing: '-.02em' }}>Sahay</div>
                                    <div className="text-[8px] font-medium tracking-widest"
                                        style={{ color: 'rgba(160,180,255,.45)' }}>YOUR HEALTH COMPANION</div>
                                </div>
                            </div>
                            <div className="text-[9px] font-semibold px-2.5 py-1 rounded-lg"
                                style={{ background: 'rgba(74,222,128,.1)', color: '#4ade80', border: '.5px solid rgba(74,222,128,.15)', letterSpacing: '.05em' }}>
                                PRUDENCE
                            </div>
                        </div>

                        {/* Divider */}
                        <div className="mx-5" style={{ height: '.5px', background: 'rgba(255,255,255,.04)' }} />

                        {/* ━━━ VIEW TOGGLE ━━━ */}
                        <div className="mx-5 mt-3 flex rounded-xl overflow-hidden"
                            style={{ background: 'rgba(255,255,255,.05)', border: '.5px solid rgba(255,255,255,.06)' }}>
                            {['voice', 'chat'].map(v => (
                                <button key={v} onClick={() => setView(v)}
                                    className="flex-1 py-2 text-[11px] font-semibold rounded-[10px] transition-all duration-300"
                                    style={{
                                        background: view === v ? 'rgba(96,130,255,.14)' : 'transparent',
                                        color: view === v ? '#a0b4ff' : 'rgba(255,255,255,.3)'
                                    }}>
                                    {v.charAt(0).toUpperCase() + v.slice(1)}
                                </button>
                            ))}
                        </div>

                        {/* ━━━ VOICE VIEW ━━━ */}
                        {view === 'voice' && (
                            <div className="flex-1 flex flex-col items-center justify-center px-5 py-6">
                                <div className="mb-2 opacity-85"><LogoMark size={52} /></div>
                                <div className="text-[30px] font-bold mb-1"
                                    style={{ color: 'rgba(255,255,255,.92)', letterSpacing: '-.02em' }}>Sahay</div>
                                <div className="text-[10px] font-medium tracking-widest mb-4"
                                    style={{ color: 'rgba(160,180,255,.4)' }}>YOUR HEALTH COMPANION</div>
                                <p className="text-[13px] text-center leading-relaxed max-w-[270px] mb-9"
                                    style={{ color: 'rgba(255,255,255,.28)' }}>
                                    Schedule medical appointments effortlessly using your voice.
                                    Simply tap the button and speak!
                                </p>

                                <WaveBars waveState={waveState} />

                                <button onClick={toggleCall}
                                    className={`flex items-center gap-2.5 px-11 py-3.5 rounded-full text-[15px] font-semibold transition-all duration-250 ${callActive ? 'call-active-pulse' : ''}`}
                                    style={{
                                        background: callActive ? 'rgba(74,222,128,.12)' : 'rgba(255,255,255,.07)',
                                        border: callActive ? '.5px solid rgba(74,222,128,.3)' : '.5px solid rgba(255,255,255,.1)',
                                        color: callActive ? '#4ade80' : 'rgba(255,255,255,.8)',
                                        letterSpacing: '.05em'
                                    }}>
                                    {callActive ? <PhoneEndIcon size={20} /> : <MicIcon size={20} />}
                                    {callActive ? 'END' : 'CALL'}
                                </button>

                                <p className="text-[11px] mt-3.5 min-h-[16px] transition-colors"
                                    style={{ color: voiceStatusColor }}>
                                    {voiceStatusText}
                                </p>
                            </div>
                        )}

                        {/* ━━━ CHAT VIEW ━━━ */}
                        {view === 'chat' && (
                            <div className="flex-1 flex flex-col min-h-0">
                                <div className="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-2.5 msgs-scroll">
                                    {history.map((turn, i) => (
                                        <div key={i} className={`flex ${turn.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className="max-w-[82%] px-3.5 py-2.5 text-[12.5px] leading-relaxed rounded-2xl"
                                                style={turn.role === 'user' ? {
                                                    background: 'rgba(96,130,255,.13)',
                                                    color: '#c8d6ff',
                                                    borderBottomRightRadius: '4px',
                                                    border: '.5px solid rgba(96,130,255,.08)'
                                                } : {
                                                    background: 'rgba(255,255,255,.05)',
                                                    color: 'rgba(255,255,255,.75)',
                                                    borderBottomLeftRadius: '4px',
                                                    border: '.5px solid rgba(255,255,255,.05)'
                                                }}>
                                                {turn.role === 'model' && (
                                                    <div className="text-[9px] font-semibold mb-1"
                                                        style={{ color: 'rgba(255,255,255,.28)', letterSpacing: '.05em' }}>SAHAY</div>
                                                )}
                                                <p>{turn.parts[0].text}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {(isThinking || isSpeaking || isListening) && (
                                        <div className="flex justify-start">
                                            <div className="flex items-center gap-1 px-3.5 py-2 rounded-2xl"
                                                style={{ background: 'rgba(255,255,255,.03)', border: '.5px solid rgba(255,255,255,.05)', borderBottomLeftRadius: '4px' }}>
                                                <div className="w-[5px] h-[5px] rounded-full typing-dot"
                                                    style={{ background: isListening ? 'rgba(239,68,68,.5)' : 'rgba(96,130,255,.35)' }} />
                                                <div className="w-[5px] h-[5px] rounded-full typing-dot"
                                                    style={{ background: isListening ? 'rgba(239,68,68,.5)' : 'rgba(96,130,255,.35)' }} />
                                                <div className="w-[5px] h-[5px] rounded-full typing-dot"
                                                    style={{ background: isListening ? 'rgba(239,68,68,.5)' : 'rgba(96,130,,.35)' }} />
                                                {isListening && (
                                                    <span className="text-[9px] font-semibold ml-1.5"
                                                        style={{ color: 'rgba(239,68,68,.5)', letterSpacing: '.04em' }}>
                                                        {interimText || 'Listening...'}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>

                                {/* ━━━ CHAT INPUT BAR ━━━ */}
                                <div className="flex items-center gap-2.5 px-4 py-3"
                                    style={{ borderTop: '.5px solid rgba(255,255,255,.05)', background: 'rgba(255,255,255,.015)' }}>
                                    <button onClick={callActive ? toggleCall : startMic} disabled={!callActive && isBusy}
                                        className={`w-[42px] h-[42px] rounded-full flex items-center justify-center flex-shrink-0 transition-all ${isListening ? 'mic-pulse' : ''} ${callActive ? 'call-active-pulse' : ''}`}
                                        style={{
                                            background: callActive ? 'rgba(239,68,68,.15)' : isListening ? 'rgba(239,68,68,.15)' : 'rgba(255,255,255,.05)',
                                            border: callActive ? '.5px solid rgba(239,68,68,.3)' : isListening ? '.5px solid rgba(239,68,68,.3)' : '.5px solid rgba(255,255,255,.08)',
                                            color: callActive ? '#fca5a5' : isListening ? '#fca5a5' : 'rgba(255,255,255,.45)',
                                            opacity: (!callActive && isBusy) ? 0.4 : 1
                                        }}>
                                        {callActive ? <PhoneEndIcon size={16} /> : <MicIcon size={16} />}
                                    </button>

                                    <form onSubmit={handleTextSubmit} className="flex-1 flex items-center gap-2.5">
                                        <input
                                            type="text"
                                            value={isListening ? interimText : inputText}
                                            onChange={(e) => setInputText(e.target.value)}
                                            placeholder={isListening ? (interimText ? '' : 'Listening...') : 'Type your message...'}
                                            disabled={isBusy}
                                            readOnly={isListening}
                                            className="flex-1 py-2.5 px-4 rounded-[22px] text-[12.5px] outline-none transition-colors"
                                            style={{ background: 'rgba(255,255,255,.04)', border: '.5px solid rgba(255,255,255,.07)', color: 'rgba(255,255,255,.8)' }}
                                        />
                                        <button type="submit"
                                            disabled={status !== 'idle' || !inputText.trim()}
                                            className="w-[42px] h-[42px] rounded-[14px] flex items-center justify-center flex-shrink-0 transition-colors"
                                            style={{ background: 'rgba(96,130,255,.2)', opacity: (status !== 'idle' || !inputText.trim()) ? 0.3 : 1 }}>
                                            <SendIcon />
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(() => { });
            });
        }
    </script>
</body>

</html>
